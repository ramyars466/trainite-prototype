model:
  name: "lang_model"
  params:
    embed_dim: 128
    num_heads: 4
    num_layers: 2
    dropout: 0.1

dataset:
  name: "string-reverse"
  params:
    vocab: "abcdefghijklmnopqrstuvwxyz"
    seq_length: 16
    dataset_size: 10000

training:
  max_epochs: 50
  batch_size: 32
  lr: 0.001
  output_dir: "output"
