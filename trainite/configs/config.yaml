vocab: "abcdefghijklmnopqrstuvwxyz"

dataset:
  name: string_reverse
  params:
    vocab: "abcdefghijklmnopqrstuvwxyz"
    seq_length: 10
    dataset_size: 20000

model:
  name: transformer
  params:
    embed_dim: 64
    num_heads: 4
    num_layers: 2
    dropout: 0.1

training:
  batch_size: 64
  lr: 0.005
  max_epochs: 100
  patience: 20
  device: cpu
  output_dir: output